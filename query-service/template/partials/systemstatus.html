<section class="info-card">
    <h2 class="card-title">System Information</h2>
    <div class="info-grid">
        <div class="info-item">
            <label>System Name</label>
            <span id="sysname">-</span>
        </div>
        <div class="info-item">
            <label>Location</label>
            <span id="sys-location">-</span>
        </div>
        <div class="info-item">
            <label>Uptime</label>
            <span id="sys-uptime">-</span>
        </div>
    </div>
</section>

<section class="metrics-section">
    <h2 class="section-title">CPU Metrics</h2>
    <div class="gauges-grid">
        <div class="gauge-card">
            <h3>Total CPU</h3>
            <div class="gauge-wrapper">
                <canvas id="cpu-gauge" style="width: 100%; height: 100%;"></canvas>
            </div>
            <div class="gauge-footer">
                <span id="cpu-value" class="gauge-value">-</span>% 
                (<span id="cpu-count">-</span> Cores)
            </div>
        </div>
    </div>
    
    <h3 class="mt-3">Core Details</h3>
    <div id="cpu-cores-container" class="cpu-cores-grid"></div>
</section>

<section class="metrics-section">
    <h2 class="section-title">System Metrics</h2>
    <div class="gauges-grid">
        
        <div class="gauge-card">
            <h3>Memory</h3>
            <div class="gauge-wrapper">
                <svg id="memory-gauge" class="gauge" viewBox="0 0 120 120">
                    <circle class="gauge-background" cx="60" cy="60" r="45"></circle>
                    <circle class="gauge-progress" cx="60" cy="60" r="45"></circle>
                </svg>
                <div class="gauge-content">
                    <span id="memory-value" class="gauge-value">0%</span>
                </div>
            </div>
            <div class="gauge-footer">
                Used: <span id="memory-used">-</span> / Total: <span id="memory-total">-</span><br>
                Free: <span id="memory-free">-</span>
            </div>
        </div>

        <div class="gauge-card">
            <h3>Swap</h3>
            <div class="gauge-wrapper">
                <svg id="swap-gauge" class="gauge" viewBox="0 0 120 120">
                    <circle class="gauge-background" cx="60" cy="60" r="45"></circle>
                    <circle class="gauge-progress" cx="60" cy="60" r="45"></circle>
                </svg>
                <div class="gauge-content">
                    <span id="swap-value" class="gauge-value">0%</span>
                </div>
            </div>
            <div class="gauge-footer">
                Used: <span id="swap-used">-</span> / Total: <span id="swap-total">-</span>
            </div>
        </div>

        <div class="gauge-card mini-gauge">
            <h3>Load 1m</h3>
            <div id="load-1m-gauge" class="mini-chart-container" style="height: 50px;"></div>
            <div class="gauge-value-text" id="load-1m-value">-</div>
        </div>

        <div class="gauge-card mini-gauge">
            <h3>Load 5m</h3>
            <div id="load-5m-gauge" class="mini-chart-container" style="height: 50px;"></div>
            <div class="gauge-value-text" id="load-5m-value">-</div>
        </div>

        <div class="gauge-card mini-gauge">
            <h3>Load 15m</h3>
            <div id="load-15m-gauge" class="mini-chart-container" style="height: 50px;"></div>
            <div class="gauge-value-text" id="load-15m-value">-</div>
        </div>

        <div class="gauge-card mini-gauge">
            <h3>Temp</h3>
            <div id="temperature-gauge" class="mini-chart-container" style="height: 50px;"></div>
            <div class="gauge-value-text">
                <span id="temperature-value">-</span>°C
                <small id="temperature-info" style="display:block; font-size: 0.7em;"></small>
            </div>
        </div>
    </div>
</section>

<section class="details-section">
    <div class="detail-card memory-chart-card">
        <h3 class="detail-title">Memory History</h3>
        <div id="memory-percent-chart"></div>
        <div id="memory-chart"></div>
        
        <div class="detail-grid mt-2">
            <div class="detail-item">
                <label>Total Detail</label>
                <span id="memory-total-detail">-</span>
            </div>
        </div>
    </div>

    <div class="detail-card">
        <h3 class="detail-title">Swap Details</h3>
        <div class="detail-grid">
            <div class="detail-item">
                <label>Total</label>
                <span id="swap-total-detail">-</span>
            </div>
            <div class="detail-item">
                <label>Free</label>
                <span id="swap-free">-</span>
            </div>
        </div>
    </div>
</section>

{% block extra_scripts %}
{% endblock %}
